name: Build ThermoPhase

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install PyQt6 matplotlib numpy pyinstaller
      - run: >
          pyinstaller --onefile --windowed --name "ThermoPhase"
          --icon "thermophase.ico"
          --add-data "engine3.py;."
          --add-data "envelope.py;."
          --add-data "tab_envelope.py;."
          --add-data "thermophase.ico;."
          --add-data "splash.png;."
          --add-data "hydrates.py;."
          --add-data "envelope_michelsen.py;."
          app_final.py
      - uses: actions/upload-artifact@v4
        with:
          name: ThermoPhase-Windows
          path: dist/ThermoPhase.exe
          retention-days: 30
